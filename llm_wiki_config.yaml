# LLM Wiki file monitoring configuration
log_level: INFO

watches:
  - path: /home/yongy/Projects/happy-projects/llm-wiki/raw/sources
    prompt: "LLM Wiki sources directory has a new file {file}. Based on the new content and ../CLAUDE.md, please process and update the wiki accordingly."
    recursive: true
    # No extensions set, monitor all file types
    permission_mode: bypassPermissions
    # Exclude hidden files and temporary files
    exclude_patterns:
      - ".git"
      - "__pycache__"
      - "*.tmp"
    # Allowed tools: read, write, edit, LSP
    allowed_tools:
      - "Read"
      - "Write"
      - "Edit"
      - "LSP"
      - "Bash(ls:*)"
