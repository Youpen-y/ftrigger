name: AI PR Review (Copilot Style)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR files and contents
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch PR info
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "${{ github.event.pull_request.url }}" > pr_info.json

          # Fetch PR files list
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "${{ github.event.pull_request.url }}/files" > pr_files.json

          # Fetch diff for reference
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.url }}" > pr.diff

          # Extract PR info
          HEAD_SHA=$(jq -r '.head.sha' pr_info.json)
          REPO=$(jq -r '.head.repo.full_name' pr_info.json)

          # Export for Python script
          export HEAD_SHA REPO

          # Create directory for file contents
          mkdir -p files_content

          # Fetch complete file contents
          python3 << 'PYEOF'
          import json
          import os
          import sys
          import urllib.request

          with open("pr_files.json", "r") as f:
              files = json.load(f)

          repo = os.environ["REPO"]
          head_sha = os.environ["HEAD_SHA"]

          manifest = []
          total_lines = 0
          failed_count = 0

          # Binary file extensions to skip
          BINARY_EXTENSIONS = {
              '.png', '.jpg', '.jpeg', '.gif', '.ico', '.svg', '.webp',
              '.pdf', '.zip', '.tar', '.gz', '.rar', '.7z',
              '.exe', '.dll', '.so', '.dylib', '.bin',
              '.woff', '.woff2', '.ttf', '.eot', '.otf',
              '.mp3', '.mp4', '.avi', '.mov', '.wav',
              '.pyc', '.class', '.jar', '.war',
          }

          for file in files:
              filename = file["filename"]

              # Skip deleted files
              if file.get("status") == "removed":
                  continue

              # Skip binary files by extension
              _, ext = os.path.splitext(filename.lower())
              if ext in BINARY_EXTENSIONS:
                  print(f"Skipping binary file: {filename}", file=sys.stderr)
                  continue

              # Check if likely text file (has patch)
              if not file.get("patch"):
                  print(f"Skipping file without patch: {filename}", file=sys.stderr)
                  continue

              # Fetch raw content
              raw_url = f"https://raw.githubusercontent.com/{repo}/{head_sha}/{filename}"
              try:
                  with urllib.request.urlopen(raw_url, timeout=10) as response:
                      content = response.read().decode('utf-8', errors='ignore')
                      line_count = len(content.split('\n'))

                      # Use __ as delimiter to avoid filename collisions
                      safe_name = filename.replace('/', '__').replace('\\', '__')
                      with open(f"files_content/{safe_name}", "w") as out:
                          out.write(content)

                      manifest.append(f"{filename}:{line_count}:{safe_name}")
                      total_lines += line_count
              except Exception as e:
                  failed_count += 1
                  print(f"Error fetching {filename}: {e}", file=sys.stderr)

          with open("files_manifest.txt", "w") as f:
              for m in manifest:
                  f.write(m + "\n")

          print(f"Fetched {len(manifest)} files, {total_lines} total lines", file=sys.stderr)
          print(f"Failed to fetch {failed_count} files", file=sys.stderr)

          # Fail if more than 50% of files failed to fetch
          if len(manifest) > 0 and failed_count > len(manifest):
              print("Too many failures, aborting", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Install anthropic
        run: pip3 install anthropic

      - name: Run AI Review
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://open.bigmodel.cn/api/anthropic
          ANTHROPIC_DEFAULT_MODEL: glm-4.7
        run: |
          python3 << 'EOF'
          import os
          import sys
          import anthropic

          diff = open("pr.diff", encoding="utf-8", errors="ignore").read()

          if not diff.strip():
              print("No diff found, skipping review")
              exit(0)

          # Load file manifest
          manifest = []
          files_content = {}

          try:
              with open("files_manifest.txt", "r") as f:
                  for line in f:
                      parts = line.strip().split(':')
                      if len(parts) == 3:
                          filename, line_count, safe_name = parts
                          manifest.append((filename, int(line_count), safe_name))

              # Load file contents with proper error handling
              for filename, line_count, safe_name in manifest:
                  try:
                      with open(f"files_content/{safe_name}", "r") as f:
                          files_content[filename] = f.read()
                  except Exception as e:
                      print(f"Warning: Could not load {filename}: {e}", file=sys.stderr)

              if not manifest:
                  print("Warning: No file contents loaded, reviewing with diff only", file=sys.stderr)

          except Exception as e:
              print(f"Warning: Could not load manifest: {e}", file=sys.stderr)

          client = anthropic.Anthropic(
              api_key=os.environ["ANTHROPIC_AUTH_TOKEN"],
              base_url=os.environ["ANTHROPIC_BASE_URL"],
          )

          # Build file contents section
          files_section = ""
          for filename, line_count, _ in manifest[:20]:  # Limit to 20 files
              if filename in files_content:
                  files_section += f"\n### {filename} ({line_count} lines)\n"
                  files_section += f"```\n{files_content[filename][:3000]}\n```\n"  # Limit each file

          prompt = f"""You are an AI code reviewer.

          **Repository:** {os.environ.get("GITHUB_REPOSITORY", "unknown")}
          **Files changed:** {len(manifest)}

          **IMPORTANT:**
          - Focus primarily on the **Diff** for what actually changed
          - Use **File Contents** as context to understand the surrounding code
          - Do NOT critique code that wasn't modified in this PR

          **Complete file contents (new version):**
          {files_section if files_section else "(No file contents available)"}

          **Diff for reference:**
          {diff}

          Review the above and provide feedback with these sections:
          - **Summary**: Brief overview of changes
          - **Potential Issues**: Any bugs, security issues, or concerns
          - **Suggestions**: Improvements or best practices
          - **LGTM**: Overall assessment (LGTM / Needs Changes)
          """

          message = client.messages.create(
              model=os.environ.get("ANTHROPIC_DEFAULT_MODEL", "glm-4.7"),
              max_tokens=4096,
              temperature=0.2,
              messages=[
                  {"role": "user", "content": prompt}
              ],
          )

          review = message.content[0].text
          open("review.md", "w", encoding="utf-8").write(review)
          EOF

      - name: Create or update bot comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('review.md', 'utf8');
            } catch (e) {
              console.log('No review generated');
              return;
            }
            const commentBody = '### 🤖 AI PR Review\n\n' + body;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('### 🤖 AI PR Review')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
